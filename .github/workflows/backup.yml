# .github/workflows/backup.yml
name: Daily Salesforce Org Backup

on:
  schedule:
    - cron: '0 0 * * *' # runs every day at midnight UTC
  workflow_dispatch: # also allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Salesforce CLI
      run: npm install --global @salesforce/cli

    - name: Authenticate to Salesforce
      run: |
        echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
        sf org login sfdx-url --sfdx-url-file auth.txt --alias backuporg

    - name: Pull all metadata from Salesforce
      run: |
        sf project retrieve start --target-org backuporg

    - name: Commit backup to GitHub
      run: |
        git config user.email "backup-bot@github.com"
        git config user.name "Backup Bot"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto backup $(date +'%Y-%m-%d %H:%M:%S')"
        git push

    - name: Notify Slack — Success
      if: success()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: '{"text":"✅ Salesforce backup completed successfully!"}'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify Slack — Failure
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: '{"text":"❌ Salesforce backup FAILED! Check GitHub Actions."}'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
